trigger:
  branches:
    include:
      - main

pool:
  vmImage: 'ubuntu-latest'

stages:
  - stage: Build
    displayName: 'Build Stage'
    jobs:
      - job: Build
        displayName: 'Build Job'
        steps:
          # 1. Checkout the repository
          - checkout: self

          # 2. Set up Python 3.12
          # Use the UsePythonVersion task to ensure Python 3.12 is available.
          - task: UsePythonVersion@0
            inputs:
              versionSpec: '3.12'
              addToPath: true
            displayName: 'Use Python 3.12'

          # 3. Create and start a virtual environment and install dependencies
          - script: |
              python -m venv venv
              # Activate the virtual environment
              source venv/bin/activate
              pip install --upgrade pip
              pip install -r requirements.txt
            displayName: 'Create virtualenv and install dependencies'

          # 4. (Optional) Run tests here if required, for example:
          # - script: |
          #     source venv/bin/activate
          #     pytest
          #   displayName: 'Run tests'

          # 5. Zip the artifact for deployment.
          # Note: Exclude the virtual environment folder.
          - script: |
              zip -r release.zip . -x "venv/*"
            displayName: 'Zip artifact for deployment'

          # 6. Publish the zip file as an artifact named "python-app"
          - publish: release.zip
            artifact: python-app
            displayName: 'Publish Artifact'

  - stage: Deploy
    displayName: 'Deploy Stage'
    dependsOn: Build
    jobs:
      - job: Deploy
        displayName: 'Deploy to Azure Web App'
        steps:
          # 1. Download the artifact from the Build stage.
          - download: current
            artifact: python-app
            displayName: 'Download Artifact'

          # 2. Verify the artifact was downloaded correctly
          - script: |
              echo "Listing downloaded artifacts:"
              ls -la $(Pipeline.Workspace)/python-app
            displayName: 'Verify artifact download'

          # 3. Deploy using the correct path
          - task: AzureRmWebAppDeployment@4
            inputs:
              ConnectionType: 'AzureRM'
              azureSubscription: 'Sparc-Azure'
              appType: 'webAppLinux'
              WebAppName: 'app-sparc-dev-wus-001'
              packageForLinux: '$(Pipeline.Workspace)/python-app/release.zip'


